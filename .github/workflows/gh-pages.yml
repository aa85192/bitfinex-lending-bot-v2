name: GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  schedule:
    # timezone: UTC
    # 每 10 分鐘更新一次（即時狀態資料）
    - cron: '*/10 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    # 必須指定此 environment，secrets 才能讀取到
    environment: aa85192
    env:
      BITFINEX_API_KEY: ${{ secrets.BITFINEX_API_KEY }}
      BITFINEX_API_SECRET: ${{ secrets.BITFINEX_API_SECRET }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'

      - name: Install dependencies (yarn)
        run: yarn

      - name: Export current status (USD + UST)
        run: INPUT_CURRENCYS=USD,UST yarn tsx ./bin/export-current-status.ts

      - name: Generate funding statistics (USD)
        run: INPUT_CURRENCYS=USD yarn tsx ./bin/funding-statistics-1.ts

      - name: Setup Node.js for webapp (npm)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp dependencies
        run: npm ci
        working-directory: webapp

      - name: Build webapp (static export)
        run: npm run build
        working-directory: webapp

      - name: Copy webapp output into dist/
        run: cp -r webapp/out/. dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
